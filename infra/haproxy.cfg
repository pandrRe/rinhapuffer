global
    maxconn 20000
    nbthread 1
    hard-stop-after 1s
    tune.bufsize 16384
    log stdout format raw local0 info
    daemon

defaults
    mode http
    maxconn 20000
    log global
    option dontlognull
    # Backend is single-threaded blocking accept — persistent connections
    # would head-of-line one socket and starve the others. Close after each
    # response so the kernel accept queue is the only buffer that matters.
    option http-server-close
    # Connect-failure retries hit a *different* server in the backend, not
    # the dead one. Pairs with `retries 2`.
    option redispatch
    timeout connect       50ms
    timeout client        10s
    timeout server        10s
    timeout http-request   2s
    timeout queue          5s
    retries 2

frontend rinha_front
    bind *:9999
    default_backend rinha_api

frontend stats
    bind :8404
    stats enable
    stats uri /
    stats refresh 5s
    stats admin if TRUE

backend rinha_api
    balance roundrobin
    server api1 unix@/sockets/api1.sock maxconn 10000
    server api2 unix@/sockets/api2.sock maxconn 10000
