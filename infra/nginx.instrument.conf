worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    access_log off;
    error_log /dev/null crit;

    sendfile on;
    tcp_nopush off;
    tcp_nodelay on;
    keepalive_timeout 65s;
    keepalive_requests 100000;

    upstream rinha_api {
        server unix:/sockets/api1.sock;
        server unix:/sockets/api2.sock;
        keepalive 256;
        keepalive_requests 100000;
        keepalive_timeout 60s;
    }

    upstream api1_only {
        server unix:/sockets/api1.sock;
        keepalive 8;
        keepalive_requests 100000;
        keepalive_timeout 60s;
    }

    upstream api2_only {
        server unix:/sockets/api2.sock;
        keepalive 8;
        keepalive_requests 100000;
        keepalive_timeout 60s;
    }

    server {
        listen 9999 backlog=4096 reuseport;

        # Pinned metrics endpoints. /__metrics-1 hits api1's /__metrics; /__metrics-2
        # hits api2's. Walking both gives a complete per-instance picture even
        # though the prod /fraud-score path is round-robined across both.
        location = /__metrics-1 {
            rewrite ^ /__metrics break;
            proxy_pass http://api1_only;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        location = /__metrics-2 {
            rewrite ^ /__metrics break;
            proxy_pass http://api2_only;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location / {
            proxy_pass http://rinha_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}
