services:
  lb:
    # rinhalb: round-robin TCP→UDS L4 splicer. Single static musl binary,
    # raw io_uring + splice(2) zero-copy. See lb/ for the source.
    image: ${RINHALB_IMAGE:-ghcr.io/pandrre/rinhalb:latest}
    environment:
      - RINHALB_LISTEN=0.0.0.0:9999
      - RINHALB_BACKENDS=/sockets/api1.sock,/sockets/api2.sock
    ports:
      - "9999:9999"
    volumes:
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    security_opt:
      - seccomp=unconfined
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    sysctls:
      net.core.somaxconn: 4096
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "10MB"

  api1:
    image: ${RINHAPUFFER_IMAGE:-ghcr.io/pandrre/rinhapuffer:latest}
    environment:
      - RINHAPUFFER_SOCKET=/sockets/api1.sock
    volumes:
      - sockets:/sockets
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "170MB"

  api2:
    image: ${RINHAPUFFER_IMAGE:-ghcr.io/pandrre/rinhapuffer:latest}
    environment:
      - RINHAPUFFER_SOCKET=/sockets/api2.sock
    volumes:
      - sockets:/sockets
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "170MB"

volumes:
  sockets:
