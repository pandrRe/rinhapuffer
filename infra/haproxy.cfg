global
    maxconn 20000
    nbthread 1
    hard-stop-after 1s
    tune.bufsize 16384
    daemon

defaults
    mode tcp
    maxconn 20000
    # No logging — every conn would otherwise write a line through the
    # container engine pipe to json-file/journald to disk. The eval HDD
    # turns that into per-conn synchronous appends. `no log` is explicit:
    # without it, HAProxy may still allocate per-conn log buffers even
    # though no log target is configured.
    no log
    # TCP-mode + splice = HAProxy stops parsing HTTP and just shovels bytes
    # between client and backend via splice(2) (kernel zero-copy). Backend
    # owns the HTTP conversation, including persistent (keep-alive) conns.
    option splice-auto
    option splice-request
    option splice-response
    option redispatch
    timeout connect       50ms
    timeout client        30s
    timeout server        30s
    timeout queue          5s
    retries 2

frontend rinha_front
    bind *:9999
    default_backend rinha_api

frontend stats
    # Stats UI must stay HTTP — defaults inherit `mode tcp` now.
    mode http
    bind :8404
    stats enable
    stats uri /
    stats refresh 5s
    stats admin if TRUE

backend rinha_api
    # Rinha rules require roundrobin. In TCP mode RR balances at connect
    # time and the conn is sticky for life. With persistent conns this means
    # ~50/50 conn split, but per-request work imbalance is possible.
    balance roundrobin
    server api1 unix@/sockets/api1.sock maxconn 10000
    server api2 unix@/sockets/api2.sock maxconn 10000
