services:
  lb:
    image: haproxy:3.0-alpine
    # `-db` = foreground, single-process. Override the image entrypoint
    # (which prepends `-W` for master-worker mode) so haproxy runs as a
    # single PID 1 process — saves the master watchdog (~8 MB RSS) and
    # one fork. Docker's restart policy stands in for the crash-restart
    # that the master would have provided. We don't need SIGUSR2 reload
    # during the eval window.
    entrypoint: ["haproxy", "-db", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
    ports:
      - "9999:9999"
    volumes:
      - ./infra/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/sockets
    depends_on:
      - api1
      - api2
    security_opt:
      - seccomp=unconfined
    # Read root-owned UDS sockets in the shared `sockets` volume — the api
    # containers run as root and bind sockets with default umask. HAProxy's
    # alpine image otherwise drops to uid 99 (haproxy), which can't connect.
    user: "0"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    sysctls:
      net.core.somaxconn: 4096
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: "30MB"

  api1:
    image: ${RINHAPUFFER_IMAGE:-ghcr.io/pandrre/rinhapuffer:latest}
    environment:
      - RINHAPUFFER_SOCKET=/sockets/api1.sock
    volumes:
      - sockets:/sockets
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "160MB"

  api2:
    image: ${RINHAPUFFER_IMAGE:-ghcr.io/pandrre/rinhapuffer:latest}
    environment:
      - RINHAPUFFER_SOCKET=/sockets/api2.sock
    volumes:
      - sockets:/sockets
    security_opt:
      - seccomp=unconfined
    deploy:
      resources:
        limits:
          cpus: "0.35"
          memory: "160MB"

volumes:
  sockets:
